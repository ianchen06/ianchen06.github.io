site_name: Notes - Ian Chen
theme:
  name: material
  features:
    - content.tabs.link
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
copyright: Copyright &copy; 2023 Ian Chen
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
